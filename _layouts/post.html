---
layout: default
---
<section class="section">
  <div class="wrap">
    <article class="article">
      <h1>{{ page.title }}</h1>
      <div class="date">{{ page.date | date: "%-d %B %Y" }}</div>
      {{ content }}
      <p style="margin-top:2rem;"><a href="{{ '/blog/' | relative_url }}">&larr; Back to all posts</a></p>
    </article>
  </div>
</section>
