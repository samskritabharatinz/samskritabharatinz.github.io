---
layout: default
---
<section class="section">
  <div class="wrap">
    {%- if page.title -%}
      <div class="section-head">
        {%- if page.eyebrow -%}<div class="eyebrow">{{ page.eyebrow }}</div>{%- endif -%}
        <h1>{{ page.title }}</h1>
      </div>
    {%- endif -%}
    {{ content }}
  </div>
</section>
